name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      # ── Debug APK (always built, for quick testing) ────────────────────────
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qascanner-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ── Release AAB (only when signing secrets are present) ────────────────
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.jks

      - name: Build release AAB
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          gradle bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/release.jks \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload release AAB
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: qascanner-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  # ── One-time keystore generator (run manually via workflow_dispatch) ────────
  generate-keystore:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias qascanner \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore /tmp/release.jks \
            -storepass Qascanner2024! \
            -keypass Qascanner2024! \
            -dname "CN=Qascanner, OU=Qaspro, O=Qaspro Global FZE, L=Dubai, S=Dubai, C=AE"
          echo "========== KEYSTORE_BASE64 — copy this into GitHub Secrets =========="
          base64 -w 0 /tmp/release.jks
          echo ""
          echo "====================================================================="
          echo "KEY_ALIAS=qascanner"
          echo "KEY_PASSWORD=Qascanner2024!"
          echo "STORE_PASSWORD=Qascanner2024!"
